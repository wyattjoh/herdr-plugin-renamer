version: 2
updates:
  # GitHub Actions: keeps the SHA-pinned `uses:` entries in .github/workflows
  # current (Dependabot reads the `# vX.Y.Z` comment and bumps SHA + comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        update-types: [minor, patch]

  # Rust crate dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
      include: scope
    groups:
      cargo-minor:
        update-types: [minor, patch]
