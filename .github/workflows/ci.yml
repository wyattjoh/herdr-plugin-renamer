name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (release)
        run: cargo build --release

  # The on-device helper links Apple FoundationModels (macOS 26 SDK). Runner SDK
  # versions can lag local Xcode, so the source sticks to widely-available API
  # labels (e.g. `sampling:` over the newer `samplingMode:`) to build on both.
  swift-helper:
    name: swift helper
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build helper
        run: swift build -c release --package-path naming-helper
