name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Build (release)
        run: cargo build --release

  # The on-device helper links Apple FoundationModels (macOS 26 SDK). While the
  # `macos-latest` label is mid-migration to macOS 26, runners land on either a
  # macOS 26 image (FoundationModels present) or an older one (module absent).
  # Rather than fail (or go red-but-ignored via continue-on-error), probe for the
  # SDK: build for real when it is present (a true gate, catching Swift breakage),
  # and skip cleanly when it is not. The source also sticks to widely-available
  # API labels (`sampling:` over the newer `samplingMode:`) so it compiles
  # wherever the SDK is present.
  swift-helper:
    name: swift helper
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build helper (skips if FoundationModels SDK is absent)
        run: |
          if echo 'import FoundationModels' | swiftc -typecheck - 2>/dev/null; then
            echo "FoundationModels available; building helper"
            swift build -c release --package-path naming-helper
          else
            echo "::notice::FoundationModels SDK not on this runner; skipping helper build"
          fi
