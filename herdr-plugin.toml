id = "herdr-plugin-renamer"
name = "Herdr Renamer"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Renames numeric tabs, plus auto-generated worktree branches and workspaces, from the agent's first prompt via an on-device or Codex naming call."
# Unix-only (the cold phase detaches via setsid). On Linux the on-device engine
# is compiled out and naming falls back to Codex; macOS adds FoundationModels.
platforms = ["macos", "linux"]

# Build steps run on `herdr plugin install` (not on `herdr plugin link`).
# During local dev, run both manually before testing.
[[build]]
command = ["cargo", "build", "--release"]

# The on-device naming engine: a SwiftPM CLI that calls Apple's FoundationModels.
# macOS-only: gated so a Linux install never tries to run `swift build`. The
# Rust binary compiles the Foundation engine out entirely off macOS, so this
# step is the matching build-time gate. Optional at runtime (the plugin falls
# back to Codex when it is missing or Apple Intelligence is unavailable).
[[build]]
command = ["swift", "build", "-c", "release", "--package-path", "naming-helper"]
platforms = ["macos"]

# Fires on EVERY agent status transition. The command bails in microseconds
# (pure env-var reads) unless an agent just started working. There is no
# manifest-level event filter in herdr 0.7.x.
[[events]]
on = "pane.agent_status_changed"
command = ["target/release/herdr-plugin-renamer"]
